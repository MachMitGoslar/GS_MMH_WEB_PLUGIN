name: Timeline
icon: clock

fields:
  title:
    label: Titel
    type: text
    placeholder: z.B. "Jahresrückblick" oder "Projekt Timeline"
  
  layout:
    label: Layout
    type: select
    options:
      standard: Standard (Links/Rechts abwechselnd)
      constrained: Kompakt (für schmale Spalten)
    default: standard
  
  entries:
    label: Timeline Einträge
    type: structure
    fields:
      year:
        label: Datum/Jahr
        type: text
        required: true
        placeholder: z.B. "März 2024" oder "2023"
      summary:
        label: Beschreibung
        type: textarea
        required: true
        placeholder: Kurze Beschreibung des Ereignisses
      image:
        label: Bild
        type: files
        query: page.images
        uploads: true
        required: false